name: Deploy MultiDocker
on:
  push:
    branches:
      - main # check your repo, your default branch might be master!
    paths:
      - "client/**"
      - "nginx/**"
      - "server/**"
      - "worker/**"
      - "docker-compose.yml"
      - ".ebextensions/**"
      - ".github/workflows/deploy.yaml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: changes
        shell: bash
        run: |
          before="${{ github.event.before }}"
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"

          has_changes() {
            echo "$changed_files" | grep -Eq "$1"
          }

          if has_changes "^client/"; then echo "client=true" >> "$GITHUB_OUTPUT"; else echo "client=false" >> "$GITHUB_OUTPUT"; fi
          if has_changes "^nginx/"; then echo "nginx=true" >> "$GITHUB_OUTPUT"; else echo "nginx=false" >> "$GITHUB_OUTPUT"; fi
          if has_changes "^server/"; then echo "server=true" >> "$GITHUB_OUTPUT"; else echo "server=false" >> "$GITHUB_OUTPUT"; fi
          if has_changes "^worker/"; then echo "worker=true" >> "$GITHUB_OUTPUT"; else echo "worker=false" >> "$GITHUB_OUTPUT"; fi
          if has_changes "^(client/|nginx/|server/|worker/)"; then echo "docker=true" >> "$GITHUB_OUTPUT"; else echo "docker=false" >> "$GITHUB_OUTPUT"; fi

      - name: Log in to Docker Hub
        if: steps.changes.outputs.docker == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Test client
        if: steps.changes.outputs.client == 'true'
        run: |
          docker build -t zizutg/react-test -f ./client/Dockerfile.dev ./client
          docker run -e CI=true zizutg/react-test npm test

      - name: Build and push client
        if: steps.changes.outputs.client == 'true'
        run: |
          docker build -t zizutg/multi-client ./client
          docker push zizutg/multi-client

      - name: Build and push nginx
        if: steps.changes.outputs.nginx == 'true'
        run: |
          docker build -t zizutg/multi-nginx ./nginx
          docker push zizutg/multi-nginx

      - name: Build and push server
        if: steps.changes.outputs.server == 'true'
        run: |
          docker build -t zizutg/multi-server ./server
          docker push zizutg/multi-server

      - name: Build and push worker
        if: steps.changes.outputs.worker == 'true'
        run: |
          docker build -t zizutg/multi-worker ./worker
          docker push zizutg/multi-worker

      - name: Generate deployment package
        run: zip -r deploy.zip . -x '*.git*' 'Dockerrun.aws.json'
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: frontend
          environment_name: Frontend-env
          region: us-east-2
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
          existing_bucket_name: elasticbeanstalk-us-east-2-977461861966
          wait_for_deployment: true
          wait_for_environment_recovery: 300
