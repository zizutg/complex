name: Deploy MultiDocker
on:
  push:
    branches:
      - main # check your repo, your default branch might be master!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t zizutg/react-test -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true zizutg/react-test npm test

      - run: docker build -t zizutg/multi-client ./client
      - run: docker build -t zizutg/multi-nginx ./nginx
      - run: docker build -t zizutg/multi-server ./server
      - run: docker build -t zizutg/multi-worker ./worker

      - run: docker push zizutg/multi-client
      - run: docker push zizutg/multi-nginx
      - run: docker push zizutg/multi-server
      - run: docker push zizutg/multi-worker
      - name: Generate deployment package
        run: zip -r deploy.zip . -x '*.git*'
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: multi-docker
          environment_name: MultiDocker-env
          region: us-east-2
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
          existing_bucket_name: elasticbeanstalk-us-east-2-977461861966